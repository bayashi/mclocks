name: Install Linux Tauri dependencies
description: APT packages required to compile and link Tauri on Ubuntu runners

runs:
  using: composite
  steps:
    - name: Install Linux build dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          build-essential \
          curl \
          wget \
          file \
          libxdo-dev \
          libssl-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          patchelf
