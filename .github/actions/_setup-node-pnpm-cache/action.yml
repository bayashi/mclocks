name: Setup Node, pnpm, and pnpm cache
description: Node LTS, global pnpm, and shared pnpm/node_modules cache

runs:
  using: composite
  steps:
    - name: setup node
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: install pnpm
      shell: bash
      run: |
        npm --version
        corepack enable
        corepack prepare pnpm@10.26.0 --activate
        pnpm --version

    - name: pnpm dependencies cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.pnpm-store
          node_modules
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-
