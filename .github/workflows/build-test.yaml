name: build-test

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
    paths-ignore:
      - '**/*.md'
      - '**/.gitignore'
      - '**/dependabot.yml'
      - 'src-mcp/**'
      - 'web-assets/**/*.css'

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: verify LF line endings
        shell: bash
        run: |
          set -euo pipefail
          crlf_lines="$(git ls-files --eol | awk '$2 == "w/crlf" { print }')"
          if [[ -n "${crlf_lines}" ]]; then
            echo "CRLF detected in tracked files:"
            echo "${crlf_lines}"
            exit 1
          fi

      - uses: ./.github/actions/_setup-rust-cache

      - uses: ./.github/actions/_setup-node-pnpm-cache

      - name: install frontend dependencies
        run: |
          pnpm install

  lint-front:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/_setup-node-pnpm-cache

      - uses: ./.github/actions/_install-pnpm-modules

      - name: run ESLint
        run: |
          pnpm exec eslint .

      - name: verify JS formatting (eslint --fix produces no diff)
        run: |
          pnpm exec eslint --fix "src/**/*.js" "*.config.js" "src-mcp/**/*.js"
          git diff --exit-code

  lint-server:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-linux-tauri-rust

      - name: verify Rust formatting
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: run Rust tests
        run: |
          cd src-tauri
          cargo test

  build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-linux-tauri-rust

      - uses: ./.github/actions/_setup-node-pnpm-cache

      - uses: ./.github/actions/_install-pnpm-modules

      - name: display version info
        run: |
          pnpm tauri info

      # Non-main
      - name: Vite production build
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: |
          pnpm build
          cargo check --manifest-path src-tauri/Cargo.toml

      # main push: full release build
      - name: Tauri build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm tauri build
