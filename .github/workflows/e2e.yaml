name: E2E Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - ".github/workflows/e2e.yaml"
      - "test/**"
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "vite.config.js"
      - "wdio.conf.js"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/e2e.yaml"
      - "test/**"
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "vite.config.js"
      - "wdio.conf.js"

jobs:
  test:
    name: E2E Test (${{ matrix.os }})
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-E2E-test')) }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Start Vite (e2e mode) and run E2E tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $root = $env:GITHUB_WORKSPACE
          $job = Start-Job -ArgumentList $root -ScriptBlock {
            param($workspace)
            Set-Location $workspace
            pnpm dev:e2e
          }
          Write-Host "Waiting for app to start..."
          $maxWait = 30
          for ($i = 0; $i -lt $maxWait; $i++) {
            try {
              $null = Invoke-WebRequest -Uri "http://localhost:1420" -TimeoutSec 1 -ErrorAction Stop
              Write-Host "App is ready"
              break
            } catch {
              Start-Sleep -Seconds 1
            }
          }
          try {
            pnpm test
          } finally {
            Stop-Job -Job $job -ErrorAction SilentlyContinue
            Remove-Job -Job $job -Force -ErrorAction SilentlyContinue
            Get-Process -Name node,tauri -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          }

      - name: Start Vite (e2e mode) and run E2E tests (macOS)
        if: runner.os == 'macOS'
        run: |
          pnpm dev:e2e &
          DEV_PID=$!
          cleanup() {
            kill $DEV_PID 2>/dev/null || true
            wait $DEV_PID 2>/dev/null || true
            pkill -f "node.*vite" 2>/dev/null || true
          }
          trap cleanup EXIT
          echo "Waiting for app to start..."
          for i in {1..30}; do
            if curl -sf "http://localhost:1420" >/dev/null; then
              echo "App is ready"
              break
            fi
            sleep 1
          done
          pnpm test
